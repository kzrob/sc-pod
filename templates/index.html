{% extends "header.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
{% endblock %}

{% block content %}
    <!-- Upload form -->
    <form method="POST" enctype="multipart/form-data" action="/upload" id="uploadForm">
        <div>
            <label for="location">Select upload location:</label>
            <select name="location" id="location">
                <option value="table" selected>Table</option>
                <option value="gallery">Gallery</option>
            </select>
        </div>
        <input type="file" name="file" accept=".txt,.tsv,text/plain"/>
        <input type="submit" value="Upload TSV">
    </form>

    <!-- Display stats -->
    <table id="statsTable">
        <thead>
            <tr>
                {% for dict in json %}
                    {% for key in dict %}
                        <th>{{ key }}</th>
                    {% endfor %}
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for dict in json %}
            <tr>
                {% for value in dict.values() %}
                    <td>{{ value }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
